{% extends 'base.html' %}

{% block title %}Đăng nhập - AI Web Builder{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card custom-card p-4">
            <h3 class="text-center mb-4 fw-bold text-primary">Login</h3>
            <form method="post">
                {% csrf_token %}

                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label text-muted fw-semibold">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}"
                        class="form-control form-control-lg" required>
                </div>
                {% endfor %}

                <button type="submit" class="btn btn-primary btn-lg w-100 mt-3 fw-bold">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
