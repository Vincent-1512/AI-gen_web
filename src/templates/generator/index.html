<!DOCTYPE html>
<html>

<head>
    <title>AI Web Builder</title>
    <link
        href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)"
        rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Hệ thống tạo Website bằng AI</h2>
            <span>Xin chào, {{ user.username }}! | <a href="{% url 'logout' %}"
                    class="btn btn-sm btn-outline-danger">Đăng xuất</a></span>
        </div>

        <form method="POST" class="card p-4 shadow mb-4">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Nhập chủ đề bạn muốn tạo:</label>
                <input type="text" name="topic" class="form-control"
                    placeholder="VD: Đặt vé máy bay, Cửa hàng điện thoại..." required>
            </div>
            <button type="submit" class="btn btn-success">Tạo Website Bằng AI</button>
        </form>

        {% if generated_html %}
        <h4 class="mb-3">Kết quả:</h4>
        <div class="border rounded bg-white" style="height: 600px; overflow: hidden;">
            <iframe srcdoc="{{ generated_html }}" width="100%" height="100%" frameborder="0"></iframe>
        </div>
        {% endif %}
    </div>
</body>

</html>
