{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card custom-card p-4 mb-4 border-top border-primary border-4">
            <h4 class="mb-3 fw-bold">Khởi tạo dự án mới</h4>
            <form method="POST">
                {% csrf_token %}
                <div class="input-group input-group-lg">
                    <input type="text" name="topic" class="form-control"
                        placeholder="VD: Đặt vé máy bay, Shop giày thể thao..." required value="{{ topic }}">
                    <button type="submit" class="btn btn-primary px-4 fw-bold">🪄 Tạo Website</button>
                </div>
                <div class="form-text mt-2 text-muted">
                    Hệ thống sẽ tự động phân tích và sinh ra giao diện HTML/CSS kèm theo Form đăng nhập.
                </div>
            </form>
        </div>
    </div>
</div>

{% if generated_html %}
<div class="row">
    <div class="col-12">
        <div class="card custom-card overflow-hidden mb-5">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-2">
                <span class="fw-semibold">Kết quả: {{ topic }}</span>
                <span class="badge bg-success">Hoàn tất</span>
            </div>
            <div class="bg-white" style="height: 650px;">
                <iframe srcdoc="{{ generated_html }}" width="100%" height="100%" frameborder="0"
                    style="border: none;"></iframe>
            </div>
        </div>
    </div>
</div>
{% endif %}
{% endblock %}
