<!DOCTYPE html>
<html>

<head>
    <title>AI Website Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center">AI Website Builder của Vincent</h2>
        <form method="POST" class="mt-4 shadow p-4 bg-white rounded">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nhập chủ đề website bạn muốn tạo:</label>
                <input type="text" name="topic" class="form-control"
                    placeholder="Ví dụ: Đặt vé máy bay, Shop bán mèo...">
            </div>
            <button type="submit" class="btn btn-primary w-100">Tạo Website Ngay</button>
        </form>

        <hr class="my-5">

        {% if content %}
        <h3 class="mb-3">Kết quả cho chủ đề: {{ topic }}</h3>
        <div class="border p-3 bg-white" style="min-height: 500px;">
            {{ content|safe }}
        </div>
        {% endif %}
    </div>
</body>

</html>
