<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Web Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .preview-pane {
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            height: 70vh;
            background-color: white;
        }
        .sidebar {
            height: 90vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="d-flex flex-column p-3 bg-white sidebar rounded">
                    <h4>AI Web Builder</h4>
                    <hr>
                    <p>Welcome, <strong>{{ request.user.username }}</strong>! (<a href="{% url 'logout' %}">Logout</a>)</p>
                    
                    <form method="post" action="{% url 'generator_view' %}" class="mb-4">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="topic" class="form-label">Enter a Website Topic:</label>
                            <input type="text" name="topic" id="topic" class="form-control" placeholder="e.g., 'Pet Adoption Center'" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Generate Website</button>
                    </form>
                    <hr>
                    <h5>Your Past Websites:</h5>
                    <ul class="nav nav-pills flex-column mb-auto">
                        {% for site in past_websites %}
                        <li class="nav-item">
                            <a href="{% url 'website_content' site.pk %}" target="preview_frame" class="nav-link {% if site.pk == latest_website.pk %}active{% endif %}">
                                {{ site.topic }}
                            </a>
                        </li>
                        {% empty %}
                        <li class="nav-item"><span class="nav-link text-muted">No websites generated yet.</span></li>
                        {% endfor %}
                    </ul>
                </div>
            </div>

            <!-- Preview Pane -->
            <div class="col-md-9">
                <h5>Preview</h5>
                <iframe name="preview_frame" class="w-100 preview-pane" 
                        src="{% if latest_website %}{% url 'website_content' latest_website.pk %}{% endif %}">
                </iframe>
            </div>
        </div>
    </div>
</body>
</html>
